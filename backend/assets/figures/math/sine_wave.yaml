id: math.sine_wave
category: math
subcategory: plot
title:
  ja: 正弦波 y = A sin(ωx + φ)
  en: Sine wave y = A sin(ω x + φ)
description:
  ja: 振幅・角周波数・位相差を指定できる正弦波のグラフ。
  en: Sine curve with adjustable amplitude, angular frequency and phase.
tags: [pgfplots, sine, trigonometry, wave]
required_packages: [pgfplots]
required_tikzlibraries: []
parameters:
  amplitude: { type: number, default: 1,  min: 0.1, max: 10 }
  omega:     { type: number, default: 1,  min: 0.1, max: 10 }
  phi:       { type: number, default: 0,  min: -6.3, max: 6.3 }
  xmin:      { type: number, default: -6.28, min: -20, max: 0 }
  xmax:      { type: number, default: 6.28,  min: 0,   max: 20 }
  color:     { type: enum, default: blue, choices: [blue, red, green, black, orange, purple] }
body: |
  \begin{tikzpicture}
  \begin{axis}[
    axis lines=middle,
    xlabel={$x$}, ylabel={$y$},
    xmin={{xmin}}, xmax={{xmax}},
    ymin={{ -1 - amplitude }}, ymax={{ 1 + amplitude }},
    samples=200, grid=both,
    width=9cm, height=6cm,
  ]
    \addplot[domain={{xmin}}:{{xmax}}, thick, {{color}}] { ({{amplitude}})*sin(deg(({{omega}})*x + ({{phi}}))) };
  \end{axis}
  \end{tikzpicture}
preview:
  params: { amplitude: 1, omega: 1, phi: 0, xmin: -6.28, xmax: 6.28, color: blue }
