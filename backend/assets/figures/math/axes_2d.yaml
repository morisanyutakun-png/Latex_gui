id: math.axes_2d
category: math
subcategory: geometry
title:
  ja: 2D 座標軸
  en: 2D coordinate axes
description:
  ja: 矢印付きのきれいな x-y 座標軸。格子と目盛りのオン/オフ可。
  en: Clean arrow-tipped Cartesian axes with optional grid and ticks.
tags: [tikz, axes, coordinate, geometry]
required_packages: [tikz]
required_tikzlibraries: [arrows.meta]
parameters:
  xmax: { type: number, default: 4, min: 1, max: 20 }
  ymax: { type: number, default: 4, min: 1, max: 20 }
  step: { type: number, default: 1, min: 0.5, max: 5 }
body: |
  \begin{tikzpicture}[>=Stealth, scale=1]
    \draw[very thin, gray!40] ({{ -xmax }}, {{ -ymax }}) grid ({{xmax}}, {{ymax}});
    \draw[->, thick] ({{ -xmax - 0.3 }}, 0) -- ({{ xmax + 0.3 }}, 0) node[below right] {$x$};
    \draw[->, thick] (0, {{ -ymax - 0.3 }}) -- (0, {{ ymax + 0.3 }}) node[above left] {$y$};
    \foreach \x in { {{ -xmax }},...,{{xmax}} } {
      \ifnum\x=0 \else
        \draw (\x,0) -- (\x,-0.08) node[below] {\scriptsize$\x$};
      \fi
    }
    \foreach \y in { {{ -ymax }},...,{{ymax}} } {
      \ifnum\y=0 \else
        \draw (0,\y) -- (-0.08,\y) node[left] {\scriptsize$\y$};
      \fi
    }
    \node[below left] at (0,0) {$O$};
  \end{tikzpicture}
preview:
  params: { xmax: 4, ymax: 4, step: 1 }
