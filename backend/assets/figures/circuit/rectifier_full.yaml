id: circuit.rectifier_full
category: circuit
subcategory: rectifier
title:
  ja: 全波整流回路 (ダイオードブリッジ)
  en: Full-wave bridge rectifier
description:
  ja: 交流電源を 4 本のダイオードで全波整流し、負荷抵抗 R_L に直流電圧を与える。
  en: Four-diode bridge full-wave rectifier feeding a load resistor.
tags: [circuitikz, rectifier, bridge, diode, full wave]
required_packages: [circuitikz]
required_tikzlibraries: []
parameters: {}
body: |
  \begin{circuitikz}
    % AC source on the left
    \draw (0,0) to[sV, v=$v_{in}$] (0,3) coordinate (top);
    \draw (0,0) coordinate (bot);
    % Diamond bridge — 4 diodes
    \draw (top) -- (2,3) coordinate (A);
    \draw (bot) -- (2,0) coordinate (B);
    \coordinate (L) at (3,1.5);
    \coordinate (R) at (5,1.5);
    \draw (A) to[D, -] (L);
    \draw (L) to[D, -] (B);
    \draw (A) to[D, -] (R);
    \draw (R) to[D, -] (B);
    % Load on the right
    \draw (L) |- (3,4) -- (6,4);
    \draw (6,4) to[R, l=$R_L$] (6,-1);
    \draw (6,-1) -- (3,-1) |- (R);
  \end{circuitikz}
