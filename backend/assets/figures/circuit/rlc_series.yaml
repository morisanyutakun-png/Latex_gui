id: circuit.rlc_series
category: circuit
subcategory: passive
title:
  ja: RLC 直列回路
  en: Series RLC circuit
description:
  ja: 交流電圧源 + 抵抗 + インダクタ + コンデンサの直列回路。
  en: AC source in series with R, L, and C.
tags: [circuitikz, rlc, ac, resonance]
required_packages: [circuitikz]
required_tikzlibraries: []
parameters:
  vlabel: { type: string, default: "V", max_len: 12 }
body: |
  \begin{circuitikz}
    \draw (0,0) to[sV, v=${{vlabel}}$] (0,3)
               to[R, l=$R$]  (2,3)
               to[L, l=$L$]  (4,3)
               to[C, l=$C$]  (4,0)
               -- (0,0);
  \end{circuitikz}
preview:
  params: { vlabel: "V" }
