id: circuit.rc_series
category: circuit
subcategory: passive
title:
  ja: RC 直列回路
  en: Series RC circuit
description:
  ja: 電圧源 + 抵抗 + コンデンサの直列回路。
  en: Voltage source in series with a resistor and a capacitor.
tags: [circuitikz, rc, passive, series]
required_packages: [circuitikz]
required_tikzlibraries: []
parameters:
  vlabel: { type: string, default: "V", max_len: 12 }
  rlabel: { type: string, default: "R", max_len: 12 }
  clabel: { type: string, default: "C", max_len: 12 }
body: |
  \begin{circuitikz}
    \draw (0,0) to[V, v=${{vlabel}}$] (0,3)
               to[R, l=${{rlabel}}$] (3,3)
               to[C, l=${{clabel}}$] (3,0)
               -- (0,0);
  \end{circuitikz}
preview:
  params: { vlabel: "V", rlabel: "R", clabel: "C" }
