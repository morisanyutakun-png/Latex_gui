id: circuit.transistor_ce
category: circuit
subcategory: amplifier
title:
  ja: NPN 共通エミッタ増幅回路
  en: NPN common-emitter amplifier
description:
  ja: バイアス抵抗 R1/R2、コレクタ抵抗 Rc、エミッタ抵抗 Re を備えた標準的な共通エミッタ増幅回路。
  en: Classic NPN common-emitter amplifier with bias resistors and coupling capacitors.
tags: [circuitikz, transistor, npn, amplifier, common emitter]
required_packages: [circuitikz]
required_tikzlibraries: []
parameters: {}
body: |
  \begin{circuitikz}
    \draw
      (0,0) node[npn] (Q) {}
      (Q.base) -- ++(-1,0) coordinate (B)
      (Q.collector) -- ++(0,1) coordinate (C)
      (Q.emitter) -- ++(0,-1) coordinate (E)
      % Vcc rail
      (C) to[R, l=$R_c$] ++(0,2) coordinate (Vcc) node[above] {$V_{cc}$}
      % Bias R1
      (B) -- (B |- Vcc) to[R, l=$R_1$] (Vcc)
      % Bias R2
      (B) to[R, l_=$R_2$] (B |- E) coordinate (GNDB)
      % Emitter R
      (E) to[R, l_=$R_e$] ++(0,-1) node[ground] {}
      % Couple GND
      (GNDB) -- (GNDB |- E) node[ground] {}
      % Input
      (B) to[C, l_=$C_{in}$] ++(-2,0) node[left] {$v_{in}$}
      % Output
      (C) to[C, l=$C_{out}$] ++(2,0) node[right] {$v_{out}$}
      ;
  \end{circuitikz}
