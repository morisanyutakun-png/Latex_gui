id: physics.free_body_block
category: physics
subcategory: mechanics
title:
  ja: 自由体図 (ブロック)
  en: Free-body diagram (block)
description:
  ja: 水平面上のブロックに働く重力・垂直抗力・摩擦力・外力を矢印で表した自由体図。
  en: Block on a horizontal surface with gravity, normal force, friction, and applied force.
tags: [tikz, mechanics, forces, free body]
required_packages: [tikz]
required_tikzlibraries: [arrows.meta, calc, patterns]
parameters:
  show_friction: { type: boolean, default: true }
  show_applied:  { type: boolean, default: true }
body: |
  \begin{tikzpicture}[>=Stealth, thick]
    % Ground
    \draw[pattern=north east lines] (-2.6,-0.35) rectangle (2.6,0);
    \draw (-2.6,0) -- (2.6,0);
    % Block
    \draw[fill=gray!15] (-1,0) rectangle (1,1.2);
    \node at (0,0.6) {$m$};
    % Gravity: from centre of mass straight down, label below block
    \draw[->, blue, very thick] (0,0.6) -- (0,-1.2) node[below, fill=white, inner sep=1pt] {$m\vec{g}$};
    % Normal force: from centre of the top contact upward
    \draw[->, red, very thick]  (0,1.2) -- (0,2.4)  node[above] {$\vec{N}$};
    {% if show_applied == "true" %}\draw[->, violet!80!black, very thick] (1,0.75) -- (2.35,0.75) node[right] {$\vec{F}$};{% endif %}
    {% if show_friction == "true" %}\draw[->, orange!85!black, very thick] (-1,0.3) -- (-2.35,0.3) node[left] {$\vec{f}$};{% endif %}
  \end{tikzpicture}
preview:
  params: { show_friction: true, show_applied: true }
