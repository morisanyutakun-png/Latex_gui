id: physics.pendulum
category: physics
subcategory: mechanics
title:
  ja: 単振り子
  en: Simple pendulum
description:
  ja: 天井から吊るした単振り子と、鉛直からの振れ角 θ。
  en: Simple pendulum suspended from a ceiling with angle θ from vertical.
tags: [tikz, pendulum, oscillation, mechanics]
required_packages: [tikz]
required_tikzlibraries: [arrows.meta, calc, patterns]
parameters:
  angle_deg: { type: number, default: 25, min: 5, max: 80 }
  length:    { type: number, default: 3,  min: 1, max: 6 }
body: |
  \begin{tikzpicture}[>=Stealth, thick]
    % Ceiling
    \draw[pattern=north east lines] (-1.6,0) rectangle (1.6,0.22);
    \draw (-1.6,0) -- (1.6,0);
    % Pendulum
    \coordinate (O) at (0,0);
    \coordinate (B) at ({ -{{length}}*sin({{angle_deg}}) }, { -{{length}}*cos({{angle_deg}}) });
    \draw[dashed, gray!70] (O) -- (0,{ -{{length}} -0.4 });
    \draw[thick] (O) -- (B);
    % Angle arc (smaller, anchored at pivot, clearly between string and vertical)
    \draw ({ -0.9*sin(0) }, { -0.9*cos(0) })
        arc ({-90}:{-90 - {{angle_deg}} }:0.9);
    \node at ({ -0.55*sin({{angle_deg}}/2) }, { -0.9*cos({{angle_deg}}/2) -0.05 }) {$\theta$};
    \filldraw[fill=blue!25, draw=blue!70!black] (B) circle (0.28);
    \node[left=4pt] at (B) {$m$};
    % Gravity vector
    \draw[->, blue, very thick] (B) -- ++(0,-1.1) node[below, fill=white, inner sep=1pt] {$m\vec{g}$};
  \end{tikzpicture}
preview:
  params: { angle_deg: 25, length: 3 }
